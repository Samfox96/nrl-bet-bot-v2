name: Weekly NRL Round Update

# Runs every Thursday at 6:00 AM AEST (20:00 UTC Wednesday).
# Can also be triggered manually from the Actions tab for testing or catch-up.
#
# FAIL-SAFE FOR THE DIGEST STEP (added 2026-06-24, after a real failure:
# the digest step failed on a real run due to a missing data/ path
# prefix -- since fixed, see generate_round_digest.py's own docstring --
# but the underlying need for an easy manual recovery path is real and
# independent of any one specific bug). A bare workflow_dispatch re-run
# is NOT sufficient to recover from a failed digest: "Determine next
# round to scrape" always computes nrl_master.csv's max round + 1, so
# re-running the whole job after a successful merge would try to
# scrape/merge the round AFTER the one whose digest failed, never
# actually resending the digest that's actually missing.
#
# Real fix: a `resend_digest_for_round` input. If set, this run SKIPS
# scraping/merging entirely and only re-runs the digest generation +
# send for the round number given -- safe to use any time a round's
# real merge already succeeded but its digest email didn't arrive
# (check the Actions log for the round number; it's also visible as
# the commit message on the most recent "Auto-merge round N" commit).
#
# TO USE: Actions tab -> "Weekly NRL Round Update" -> "Run workflow" ->
# enter the round number (e.g. "16") in resend_digest_for_round -> Run.
# Leave it blank for a normal scheduled-style run (scrape + merge +
# digest for whatever the next real round is).
#
# IMPLEMENTATION NOTE: every "if" condition below checks
# `github.event_name == 'workflow_dispatch' && github.event.inputs...`
# rather than relying on the input alone. Confirmed via real, multiple
# independent sources (2026-06-24) that `github.event.inputs.X` on a
# schedule trigger SHOULD correctly evaluate to empty string, but other
# real GitHub Actions users have hit type-coercion errors trusting
# `github.event.inputs.X` alone in conditions evaluated across multiple
# trigger types (e.g. "Unexpected type of value '', expected type:
# String" in a concurrency block). Explicitly gating on event_name
# first removes any ambiguity for the one trigger type (the real
# Wednesday schedule) that must never be accidentally skipped.
on:
  schedule:
    - cron: '0 20 * * 3'
  workflow_dispatch:
    inputs:
      resend_digest_for_round:
        description: 'Round number to RESEND THE DIGEST ONLY for (skips scrape/merge entirely -- use this to recover from a digest-send failure on an already-merged round). Leave blank for a normal full run.'
        required: false
        type: string

jobs:
  scrape-validate-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Real, single source of truth for "are we in digest-resend mode"
      # -- computed ONCE here rather than repeating the same compound
      # github.event_name/inputs check in every single step's `if:`.
      # On a schedule trigger, github.event.inputs is not populated at
      # all, so this correctly evaluates to empty string (confirmed via
      # multiple real sources 2026-06-24) -- the && short-circuits
      # before ever touching .inputs on a non-dispatch trigger.
      RESEND_ROUND: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.resend_digest_for_round || '' }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: env.RESEND_ROUND == ''
        run: |
          # beautifulsoup4 added 2026-07-03 -- REAL ROOT CAUSE of the
          # Round 17 scrape failure: nrl_update_single_round.py imports
          # parse_try_minutes.py at module level (added 2026-06-23 for
          # Phase 4 try_minute capture), and parse_try_minutes.py
          # imports bs4. This step never installed it, so the scraper
          # crashed at import time -- before FALLBACK_URLS or any round
          # logic ever ran. Confirmed via local reproduction: running
          # the scraper with exactly this step's pre-fix dependency set
          # raises "ModuleNotFoundError: No module named 'bs4'" and
          # exits 1. generate-predictions.yml already had this exact
          # fix applied 2026-06-24 for the same reason (its own
          # parse_team_list.py -> bs4 chain) -- this brings Job A's
          # install step to parity with that one.
          pip install pandas selenium webdriver-manager beautifulsoup4

      - name: Install Chrome
        if: env.RESEND_ROUND == ''
        uses: browser-actions/setup-chrome@v1

      - name: Determine next round to scrape
        id: next_round
        if: env.RESEND_ROUND == ''
        run: |
          # Same real fix as generate-predictions.yml (2026-06-25) --
          # collapsed to a single-line, semicolon-separated python3 -c
          # to avoid the real, confirmed three-way indentation conflict
          # between YAML's block scalar, bash heredocs, and Python's
          # own indentation rules (a heredoc-based fix was tried first
          # and hit a genuine YAML parse error -- see
          # generate-predictions.yml's own comment here for the full
          # real story). Tested directly against real nrl_master.csv
          # under bash before trusting it.
          NEXT_ROUND=$(python3 -c "import pandas as pd; df = pd.read_csv('data/nrl_master.csv'); print(int(df['round'].max()) + 1)")
          echo "round=$NEXT_ROUND" >> "$GITHUB_OUTPUT"
          echo "Next round to scrape: $NEXT_ROUND"

      - name: Run scraper for next round
        id: scrape
        if: env.RESEND_ROUND == ''
        continue-on-error: true
        run: |
          mkdir -p data/pending
          python3 scripts/nrl_update_single_round.py \
            --round "${{ steps.next_round.outputs.round }}" \
            --output "data/pending/nrl_round_${{ steps.next_round.outputs.round }}_new.csv"

      - name: Upload debug screenshots (only if scraper had trouble)
        if: always() && env.RESEND_ROUND == ''
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-round-${{ steps.next_round.outputs.round }}
          path: debug_screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Validate and merge
        id: validate_merge
        # REAL BUG FOUND AND FIXED 2026-07-03: this step was missing
        # `steps.scrape.outcome == 'success'` -- the match-results
        # equivalent below ("Validate and merge match results") already
        # has this exact gate, this one never did. Confirmed real
        # consequence: when the scrape step crashed (bs4 missing, see
        # Install dependencies step above), this step still ran,
        # merge_round.py found no pending file and exited 0 ("nothing
        # to merge" treated as success), which made
        # steps.validate_merge.outcome == 'success' true anyway --
        # silently firing the digest for "Round 17" off stale Round 16
        # data. Confirmed via real commit history: a due-flags snapshot
        # and a nrl_master-unchanged commit both landed the same run
        # the scrape failure issue was opened. Adding the scrape-
        # success gate here (mirroring the match-results step) means a
        # failed scrape now correctly skips merge/digest entirely
        # rather than reaching merge_round.py's benign "nothing to do"
        # path. merge_round.py itself is also hardened separately (see
        # its own docstring) so this can't recur even if this gate is
        # ever removed again.
        if: env.RESEND_ROUND == '' && steps.scrape.outcome == 'success'
        continue-on-error: true
        run: |
          python3 scripts/merge_round.py

      - name: Commit changes (only runs if merge succeeded)
        if: env.RESEND_ROUND == '' && steps.validate_merge.outcome == 'success'
        run: |
          git config user.name "nrl-bot-automation"
          git config user.email "actions@github.com"
          git add data/nrl_master.csv STATUS.md
          git commit -m "Auto-merge round ${{ steps.next_round.outputs.round }} (validated)" || echo "Nothing to commit"
          git push

      # ============================================================
      # REAL MATCH-RESULTS SCRAPE/VALIDATE/MERGE -- added 2026-06-25
      # ============================================================
      # Added after discovering data/match_data_FINAL_fixed.csv had
      # been silently stuck at Round 10 since a one-time June 21
      # upload (confirmed via real git history: exactly one commit,
      # ever) while nrl_master.csv (the player-stats file, scraped by
      # the steps above) was correctly refreshed every week. This
      # silently fed every Elo rating, win probability, predicted
      # margin, h2h history, and form-streak calculation in the real
      # predictions pipeline from stale data for 6+ real rounds --
      # confirmed via a real, direct symptom Sam caught manually (a
      # real predictions email claiming "Roosters red-hot, 5 wins from
      # 5" while the real live ladder showed their actual recent form
      # was 2-2). Backfilled manually for rounds 11-16 (2026-06-25);
      # these new steps exist so the SAME gap can never silently recur
      # -- this scrapes and merges the SAME round nrl_update_single_round.py
      # already determined above (steps.next_round.outputs.round),
      # using a real, separate scraper (scrape_match_results.py) since
      # match results live on a structurally different real nrl.com
      # page (the round-level draw/results page, not the per-match
      # player-stats page) -- see that script's own real docstring for
      # the full confirmed-selector story.
      #
      # Mirrors the EXACT same real continue-on-error + conditional-
      # commit pattern as the player-stats steps above, deliberately --
      # a real failure here should open a real GitHub Issue (see below)
      # and leave match_data_FINAL_fixed.csv untouched, never silently
      # merge something unvalidated.
      - name: Run match-results scraper for next round
        id: scrape_match_results
        if: env.RESEND_ROUND == ''
        continue-on-error: true
        run: |
          mkdir -p data/pending_match_results
          python3 scripts/scrape_match_results.py \
            --round "${{ steps.next_round.outputs.round }}" \
            --season 2026 \
            --output "data/pending_match_results/match_results_round_${{ steps.next_round.outputs.round }}_backfill.csv"
        # Real output filename deliberately matches
        # merge_match_results_backfill.py's own real glob pattern
        # (match_results_round_*_backfill.csv) -- confirmed by reading
        # that script's own source -- so the exact same real,
        # already-validated merge script can be reused here for a
        # single round, with zero modification needed.

      - name: Validate and merge match results
        id: validate_merge_match_results
        if: env.RESEND_ROUND == '' && steps.scrape_match_results.outcome == 'success'
        continue-on-error: true
        run: |
          python3 scripts/merge_match_results_backfill.py \
            --backfill-dir data/pending_match_results \
            --master data/match_data_FINAL_fixed.csv \
            --team-aliases data/team_aliases.json

      - name: Commit match results (only runs if merge succeeded)
        if: env.RESEND_ROUND == '' && steps.validate_merge_match_results.outcome == 'success'
        run: |
          git config user.name "nrl-bot-automation"
          git config user.email "actions@github.com"
          git add data/match_data_FINAL_fixed.csv
          git commit -m "Auto-merge match results for round ${{ steps.next_round.outputs.round }} (validated)" || echo "Nothing to commit"
          git push
          rm -rf data/pending_match_results

      - name: Open issue on failure (match results)
        if: env.RESEND_ROUND == '' && (steps.scrape_match_results.outcome == 'failure' || steps.validate_merge_match_results.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Match results scrape/merge failed for round ${{ steps.next_round.outputs.round }}`,
              body: [
                `The automated match-results scrape or merge for round ${{ steps.next_round.outputs.round }} failed.`,
                ``,
                `**data/match_data_FINAL_fixed.csv has NOT been changed.** Any real scraped `,
                `file (if the scrape itself succeeded) is left in data/pending_match_results/ `,
                `for manual review.`,
                ``,
                `Check the workflow run log for the real error:`,
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `Common causes: nrl.com page structure change (the round-level draw page's `,
                `real .match--highlighted/.match-venue selectors may have changed), a real `,
                `team-name variant not yet in team_aliases.json, or a real round/bye-count `,
                `mismatch against the known schedule in merge_match_results_backfill.py's `,
                `EXPECTED_BYES dict (which covers rounds 11-17 currently -- extend it `,
                `for later rounds, same as season_draw_2026.json needs extending via `,
                `extend_season_draw.py).`
              ].join('\n'),
              labels: ['needs-review', 'automation']
            })

      # ============================================================
      # REAL SEASON-DRAW AUTO-EXTENSION -- added 2026-06-25
      # ============================================================
      # Added after confirming a SECOND real automation gap, structurally
      # identical to match_data_FINAL_fixed.csv's: season_draw_2026.json
      # is read-only everywhere in the codebase (due_flags_v2.py,
      # generate_predictions.py both raise a real, loud error if the
      # round they need isn't in this file's real "rounds" dict) but
      # nothing automatically extends it. Manually extended to round 19
      # on 2026-06-25; this step exists so it never needs a manual
      # extension again.
      #
      # Real design: keeps the file covering "this week's round + 2"
      # (a real 2-round BUFFER, not just exactly enough) -- deliberately
      # ahead of generate-predictions.yml's real, immediate need, so a
      # single missed/failed run of THIS step doesn't immediately break
      # next week's predictions too. Runs in weekly-update.yml (NOT
      # generate-predictions.yml) because this job runs 3 real hours
      # BEFORE generate-predictions.yml each Wednesday (confirmed via
      # generate-predictions.yml's own real comment) -- the draw file
      # must already be extended before predictions generation needs it,
      # not after.
      #
      # extend_season_draw.py only takes ONE round per real call (no
      # range mode, unlike scrape_match_results.py) -- this step loops
      # over whichever real rounds are genuinely missing rather than
      # modifying that already-tested script.
      - name: Extend season draw (real 2-round buffer ahead)
        id: extend_draw
        if: env.RESEND_ROUND == ''
        continue-on-error: true
        run: |
          TARGET_ROUND=$(( ${{ steps.next_round.outputs.round }} + 2 ))
          echo "Real target: season_draw_2026.json should cover through round $TARGET_ROUND"
          CURRENT_MAX=$(python3 -c "import json; d = json.load(open('data/season_draw_2026.json')); rounds = [int(r) for r in d['rounds'].keys()]; print(max(rounds) if rounds else 0)")
          echo "Real current max round covered: $CURRENT_MAX"
          if [ "$CURRENT_MAX" -ge "$TARGET_ROUND" ]; then
            echo "Real season_draw_2026.json already covers far enough ahead -- nothing to do."
            exit 0
          fi
          # REAL BUG FOUND AND FIXED 2026-06-25, caught by directly
          # testing this loop with a simulated mid-loop failure before
          # ever shipping it: bash's `while` loop does NOT propagate a
          # single iteration's non-zero exit code out of the loop --
          # the script would silently continue past a real failed
          # round and exit 0 (success) anyway, since only the LAST
          # command's exit code matters by default. That would have
          # caused a real partial extension to be committed and
          # reported as a clean success, masking a genuine failure.
          # Fixed: track failures explicitly in ANY_FAILED, still
          # attempt every real round (so one bad round doesn't block
          # later ones that might genuinely succeed), but exit non-zero
          # at the end if anything failed.
          ANY_FAILED=0
          NEXT_TO_ADD=$((CURRENT_MAX + 1))
          while [ "$NEXT_TO_ADD" -le "$TARGET_ROUND" ]; do
            echo "Real extending season_draw_2026.json: round $NEXT_TO_ADD"
            if ! python3 scripts/extend_season_draw.py \
              --round "$NEXT_TO_ADD" \
              --season 2026 \
              --season-draw data/season_draw_2026.json \
              --team-aliases data/team_aliases.json; then
              echo "WARNING: real extension FAILED for round $NEXT_TO_ADD -- continuing to attempt later rounds, but this run will be reported as a real failure."
              ANY_FAILED=1
            fi
            NEXT_TO_ADD=$((NEXT_TO_ADD + 1))
          done
          if [ "$ANY_FAILED" -eq 1 ]; then
            echo "Real failure occurred during this run -- exiting non-zero so the failure issue step fires."
            exit 1
          fi

      - name: Commit season draw extension (only runs if extension succeeded)
        if: env.RESEND_ROUND == '' && steps.extend_draw.outcome == 'success'
        run: |
          git config user.name "nrl-bot-automation"
          git config user.email "actions@github.com"
          git add data/season_draw_2026.json
          git commit -m "Auto-extend season_draw_2026.json (buffer ahead of round ${{ steps.next_round.outputs.round }})" || echo "Nothing to commit"
          git push

      - name: Open issue on failure (season draw extension)
        if: env.RESEND_ROUND == '' && steps.extend_draw.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Season draw extension failed (round ${{ steps.next_round.outputs.round }} + buffer)`,
              body: [
                `The automated season_draw_2026.json extension failed this week.`,
                ``,
                `**This is a real, genuine risk for NEXT week's predictions run** -- `,
                `if the real buffer runs out before this is fixed, generate-predictions.yml `,
                `will fail outright (due_flags_v2.py and generate_predictions.py both raise `,
                `a real, loud error if the round they need isn't in season_draw_2026.json).`,
                ``,
                `Check the workflow run log for the real error:`,
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `Common causes: nrl.com page structure change (the round-level draw page's `,
                `real .match.o-rounded-box selector may have changed), or a real team-name `,
                `variant not yet in team_aliases.json. As a real, manual stopgap: run `,
                `scripts/extend_season_draw.py locally for the missing round(s) and commit `,
                `the result directly.`
              ].join('\n'),
              labels: ['needs-review', 'automation']
            })


    # ============================================================
# Phase 5 addition to .github/workflows/weekly-update.yml
# ============================================================
# Insert this step immediately AFTER the existing
# "Commit changes (only runs if merge succeeded)" step, and BEFORE
# the "Commit pending file for review" step. It deliberately uses the
# same `if: steps.validate_merge.outcome == 'success'` condition as the
# commit step above it, so the digest email only fires on a genuine
# clean merge -- never on a validation failure (those already get a
# GitHub Issue via the existing "Open issue on failure" step, and
# should NOT also receive a "good news" digest).
#
# Requires one new repository secret: RESEND_API_KEY
# (Settings -> Secrets and variables -> Actions -> New repository secret)
# Get a free API key at https://resend.com -- free tier is 3,000
# emails/month, 100/day, comfortably covers one email per week.
#
# Also requires DIGEST_TO_EMAIL as a repository secret (or variable) --
# the inbox the digest should land in. Stored as a secret rather than
# hardcoded so the email address itself isn't sitting in plain text in
# a public repo (the repo is public as of 2026-06-23).

      - name: Install digest dependencies
        if: env.RESEND_ROUND == '' && steps.validate_merge.outcome == 'success'
        run: |
          pip install pandas

      - name: Generate and send round digest
        if: env.RESEND_ROUND == '' && steps.validate_merge.outcome == 'success'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'scripts')
          from generate_round_digest import build_digest
          from send_round_digest import send_digest_email, write_due_flags_snapshot

          round_num = ${{ steps.next_round.outputs.round }}
          digest = build_digest(
              'data/nrl_master.csv',
              round_num=round_num,
              season=2026,
              team_aliases_path='data/team_aliases.json',
              position_aliases_path='data/position_aliases.json',
              zcr_baseline_path='data/historical_zcr_baseline.csv',
              position_tpg_baseline_path='data/historical_position_tpg_baseline.csv',
              season_draw_path='data/season_draw_2026.json',
              historical_player_match_rows_path='data/historical_player_match_rows.csv',
          )
          to_email = '${{ secrets.DIGEST_TO_EMAIL }}'.strip()
          if not to_email:
              raise RuntimeError('DIGEST_TO_EMAIL secret is not set -- add it under Settings > Secrets and variables > Actions')
          send_digest_email(digest, to_email=to_email)
          write_due_flags_snapshot(digest, path='data/due_flags_last_run.json')
          print(f'Digest sent for round {round_num}')
          "

      - name: Commit digest snapshot
        if: env.RESEND_ROUND == '' && steps.validate_merge.outcome == 'success'
        run: |
          git config user.name "nrl-bot-automation"
          git config user.email "actions@github.com"
          git add data/due_flags_last_run.json
          git commit -m "Save DUE flags snapshot for round ${{ steps.next_round.outputs.round }}" || echo "Nothing to commit"
          git push

      - name: Commit pending file for review (only runs if validation failed)
        if: env.RESEND_ROUND == '' && (steps.validate_merge.outcome == 'failure' || steps.scrape.outcome == 'failure')
        run: |
          git config user.name "nrl-bot-automation"
          git config user.email "actions@github.com"
          git add data/pending/
          git commit -m "Round ${{ steps.next_round.outputs.round }}: scrape/validation needs review" || echo "Nothing to commit"
          git push

      - name: Open issue on failure
        if: env.RESEND_ROUND == '' && (steps.validate_merge.outcome == 'failure' || steps.scrape.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Round ${{ steps.next_round.outputs.round }} needs manual review`,
              body: [
                `The automated weekly scrape for round ${{ steps.next_round.outputs.round }} did not pass validation, or the scrape itself failed.`,
                ``,
                `**nrl_master.csv has NOT been changed.** The raw scrape (if any) is committed at \`data/pending/nrl_round_${{ steps.next_round.outputs.round }}_new.csv\` for review.`,
                ``,
                `Check the workflow run log for the full validation report:`,
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `Common causes: nrl.com blocking the cloud IP (different from a home connection), a page structure change, or a genuine data anomaly (e.g. unscheduled bye, postponed match).`
              ].join('\n'),
              labels: ['needs-review', 'automation']
            })

      # ============================================================
      # DIGEST-ONLY RESEND PATH (added 2026-06-24) -- runs ONLY when
      # RESEND_ROUND is set, and does NOT depend on any of the
      # scrape/merge steps above (which all skipped themselves in this
      # mode) -- this step alone reads nrl_master.csv (already real and
      # current from whatever round previously merged) and resends the
      # digest for the EXACT round number given, rather than
      # recomputing "next round" the way a normal run does.
      # ============================================================
      - name: Install digest dependencies (resend-only mode)
        if: env.RESEND_ROUND != ''
        run: |
          pip install pandas

      - name: Resend digest for a specific already-merged round
        if: env.RESEND_ROUND != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'scripts')
          from generate_round_digest import build_digest
          from send_round_digest import send_digest_email, write_due_flags_snapshot

          round_num = ${{ env.RESEND_ROUND }}
          digest = build_digest(
              'data/nrl_master.csv',
              round_num=round_num,
              season=2026,
              team_aliases_path='data/team_aliases.json',
              position_aliases_path='data/position_aliases.json',
              zcr_baseline_path='data/historical_zcr_baseline.csv',
              position_tpg_baseline_path='data/historical_position_tpg_baseline.csv',
              season_draw_path='data/season_draw_2026.json',
              historical_player_match_rows_path='data/historical_player_match_rows.csv',
          )
          to_email = '${{ secrets.DIGEST_TO_EMAIL }}'.strip()
          if not to_email:
              raise RuntimeError('DIGEST_TO_EMAIL secret is not set -- add it under Settings > Secrets and variables > Actions')
          send_digest_email(digest, to_email=to_email)
          write_due_flags_snapshot(digest, path='data/due_flags_last_run.json')
          print(f'RESEND: digest sent for round {round_num}')
          "

      - name: Commit digest snapshot (resend-only mode)
        if: env.RESEND_ROUND != ''
        run: |
          git config user.name "nrl-bot-automation"
          git config user.email "actions@github.com"
          git add data/due_flags_last_run.json
          git commit -m "Resend digest snapshot for round ${{ env.RESEND_ROUND }}" || echo "Nothing to commit"
          git push
