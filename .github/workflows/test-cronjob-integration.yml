name: TEST - cron-job.org Integration (one-off, delete after verifying)

# ONE-OFF TEST WORKFLOW. Not part of the regular pipeline.
#
# Manually triggered only. Runs test_cronjob_trigger.py, which creates a
# single cron-job.org scheduled job set to fire ~5 minutes from when this
# workflow runs, targeting team-list-polling.yml's workflow_dispatch
# endpoint. Purpose: verify the real, live chain (cron-job.org -> GitHub
# API -> actual workflow run) works before trusting
# schedule_kickoff_triggers.py with real match data.
#
# After running this once and confirming Job B fires correctly a few
# minutes later, this workflow file and test_cronjob_trigger.py can both
# be deleted from the repo -- they have no ongoing purpose once the
# integration is verified.
on:
  workflow_dispatch: {}

jobs:
  test-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Create test trigger via cron-job.org
        env:
          CRONJOB_API_KEY: ${{ secrets.CRONJOB_API_KEY }}
          WORKFLOW_DISPATCH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
        run: python3 scripts/test_cronjob_trigger.py
