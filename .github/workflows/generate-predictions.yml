name: Weekly NRL Predictions

# Runs once per round, early in the cycle -- Thursday at 9:00 AM AEST
# (23:00 UTC Wednesday), 3 hours after Job A's weekly-update.yml
# (20:00 UTC Wednesday) so this round's just-merged nrl_master.csv data
# is genuinely current before predictions are generated against it.
# This timing matches Sam's own stated real workflow: an email at the
# start of the round, with further odds checks done manually
# (ask Claude directly) rather than another automated per-kickoff job --
# see generate_predictions.py's own docstring for the real credit-
# budget math behind why this is comfortable on the free tier even with
# manual rechecks added on top.
on:
  schedule:
    - cron: '0 23 * * 3'
  workflow_dispatch:
    inputs:
      round_override:
        description: 'Round number to generate predictions for (optional -- defaults to nrl_master.csv max round + 1, same logic as the scheduled run)'
        required: false
        type: string

jobs:
  generate-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 15 min is generous for this job's real workload: 8 real event-odds
    # fetches (network-bound, not compute-heavy) + xtry_model.py's real
    # per-player calculation (confirmed fast in this session's testing --
    # a full round's both-squad calculation completed well under a
    # second locally; network latency to the-odds-api.com is the only
    # real bottleneck, and even 8 sequential real calls shouldn't
    # approach 15 minutes barring a genuine outage).

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas beautifulsoup4
          # beautifulsoup4 added 2026-06-24 -- REAL BUG FOUND: the live
          # team-list fallback (generate_predictions.py's
          # fetch_real_team_list_live(), via parse_team_list.py) failed
          # on its real first live run with "No module named 'bs4'".
          # This wasn't a network/bot-blocking issue as initially
          # suspected -- the real Actions log showed the exact, simple
          # cause: this step never installed parse_team_list.py's real
          # hard dependency. Caught via Sam pasting the real log line
          # rather than guessed at -- confirmed real root cause before
          # this fix, not a speculative one.

      - name: Determine round to predict
        id: round
        run: |
          if [ -n "${{ github.event.inputs.round_override }}" ]; then
            ROUND="${{ github.event.inputs.round_override }}"
          else
            # REAL BUG FOUND AND FIXED 2026-06-25: the original inline
            # `python3 -c "..."` here had its multi-line script body
            # indented to match this YAML block's visual indentation --
            # but that indentation is LITERAL inside the Python string
            # itself, and an indented first statement with no enclosing
            # block is a real, genuine IndentationError in Python --
            # confirmed via a real Actions log from this workflow's
            # first genuine SCHEDULED run (2026-06-25, 10:09am Sydney
            # time): every prior test in this project used
            # workflow_dispatch with round_override set, which takes
            # the OTHER branch of this if/else and never exercised this
            # real bug until the real cron schedule fired for the first
            # time.
            #
            # A heredoc-based fix was tried first but hit a real,
            # separate constraint: YAML's block scalar (the `|` above)
            # requires every line, including a heredoc's closing
            # delimiter, to stay at or above this block's indentation,
            # while bash's `<<'EOF'`-style heredoc requires its closing
            # delimiter to have ZERO leading whitespace -- those two
            # real requirements are mutually exclusive here, confirmed
            # by hitting a genuine YAML parse error on the first
            # attempt. Real fix: collapse to a single-line, semicolon-
            # separated `python3 -c "..."` instead -- no multi-line
            # heredoc, no indentation to get wrong in any of the three
            # layers (YAML / bash / Python). Tested directly against
            # real nrl_master.csv under bash (GitHub Actions' real
            # default shell) before trusting it.
            ROUND=$(python3 -c "import pandas as pd; df = pd.read_csv('data/nrl_master.csv'); print(int(df['round'].max()) + 1)")
          fi
          echo "round=$ROUND" >> "$GITHUB_OUTPUT"
          echo "Generating predictions for round: $ROUND"

      - name: Generate predictions
        id: generate
        continue-on-error: true
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          if [ -z "$ODDS_API_KEY" ]; then
            echo "ERROR: ODDS_API_KEY secret is not set -- add it under Settings > Secrets and variables > Actions"
            exit 1
          fi
          python3 scripts/generate_predictions.py \
            --season 2026 \
            --round "${{ steps.round.outputs.round }}" \
            --data-dir data \
            --output data/predictions_current.csv

      - name: Commit predictions file (only runs if generation succeeded)
        if: steps.generate.outcome == 'success'
        run: |
          git config user.name "nrl-bot-automation"
          git config user.email "actions@github.com"
          git add data/predictions_current.csv data/predictions_current.json data/predictions_history/
          git commit -m "Auto-generate predictions for round ${{ steps.round.outputs.round }}" || echo "Nothing to commit"
          git push

      # ============================================================
      # Email digest -- reuses send_round_digest.py's real, already-
      # proven Resend pattern (same User-Agent fix, same sandbox
      # sender, same RESEND_API_KEY/DIGEST_TO_EMAIL secrets already in
      # use by weekly-update.yml -- no new email secrets needed).
      #
      # build_predictions_digest()/send_predictions_email() live in
      # scripts/send_predictions_digest.py (built and validated
      # 2026-06-24 against the real CSV output from this same
      # workflow's generate_predictions.py step, including a real
      # plain-text and HTML render check -- not a phantom reference).
      # ============================================================
      - name: Send predictions email
        id: send_email
        if: steps.generate.outcome == 'success'
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'scripts')
          from send_predictions_digest import build_predictions_digest, send_predictions_email, validate_digest_before_send

          round_num = ${{ steps.round.outputs.round }}
          digest = build_predictions_digest(
              'data/predictions_current.json',
              round_num=round_num,
              position_tpg_baseline_path='data/historical_position_tpg_baseline.csv',
          )
          # Real, content-based sanity check added 2026-06-25, per Sam's
          # explicit request: every checkpoint before this was exception-
          # based ('did the code crash'), not content-based ('does the
          # real output actually look right'). This is the real check --
          # see validate_digest_before_send()'s own docstring for the
          # real failure patterns it's built from. A failed check raises
          # here, which this step's continue-on-error + the existing
          # 'Open issue on failure (email)' step below turns into a real
          # GitHub Issue rather than a silently-sent, possibly-wrong email.
          is_valid, problems = validate_digest_before_send(digest)
          if not is_valid:
              for p in problems:
                  print(f'SANITY CHECK FAILED: {p}')
              raise RuntimeError(f'Pre-send sanity check found {len(problems)} real problem(s) -- email NOT sent. See log above for details.')
          to_email = '${{ secrets.DIGEST_TO_EMAIL }}'.strip()
          if not to_email:
              raise RuntimeError('DIGEST_TO_EMAIL secret is not set')
          send_predictions_email(digest, to_email=to_email)
          print(f'Predictions email sent for round {round_num}')
          "

      - name: Open issue on failure (generation)
        if: steps.generate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Predictions generation failed for round ${{ steps.round.outputs.round }}`,
              body: [
                `The automated predictions run for round ${{ steps.round.outputs.round }} failed.`,
                ``,
                `**data/predictions_current.csv and data/predictions_current.json have NOT been updated.**`,
                ``,
                `Check the workflow run log for the real error:`,
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `Common causes: ODDS_API_KEY secret missing/expired, the-odds-api.com`,
                `rate limit or outage, season_draw_2026.json not yet covering this round`,
                `(confirmed as of 2026-06-24 to only cover rounds 17-18 -- extend it`,
                `before this runs for a later round), or a real upstream change to`,
                `the-odds-api.com's response shape that odds_fetcher.py's reshaping`,
                `functions weren't built to handle.`
              ].join('\n'),
              labels: ['needs-review', 'automation', 'phase-8']
            })

      # ============================================================
      # REAL GAP FOUND AND FIXED 2026-06-24: the email step previously
      # had NO failure-notification path of its own -- it was only
      # gated on the GENERATION step's success, with no continue-on-
      # error/id, so a genuine real failure inside the email step
      # itself (confirmed real case: send_predictions_digest.py reading
      # an empty/missing predictions_current.json because the commit
      # step above only ever added the .csv file, never the .json file
      # write_predictions_json() actually produces) showed only a red X
      # in the Actions tab with no GitHub Issue, no notification --
      # exactly the silent-failure mode Sam asked for a fail-safe
      # against in the first place. Fixed alongside the actual root
      # cause (the missing `git add ... predictions_current.json` and
      # the stale CSV-path/old-signature call in the email step above).
      # ============================================================
      - name: Open issue on failure (email)
        if: steps.generate.outcome == 'success' && steps.send_email.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Predictions email failed to send for round ${{ steps.round.outputs.round }}`,
              body: [
                `Predictions generated and committed successfully for round ${{ steps.round.outputs.round }}, but the email failed to send.`,
                ``,
                `**data/predictions_current.csv and data/predictions_current.json ARE up to date** -- only the email notification failed.`,
                ``,
                `Check the workflow run log for the real error:`,
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `Common causes: RESEND_API_KEY or DIGEST_TO_EMAIL secret missing, a real`,
                `Resend API issue, or a mismatch between send_predictions_digest.py's real`,
                `function signature and this workflow's call to it (check both match after`,
                `any future change to either file).`
              ].join('\n'),
              labels: ['needs-review', 'automation', 'phase-8']
            })
