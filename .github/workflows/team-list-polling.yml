name: Team List Polling (Job B)

# JOB B of two Thursday-anchored jobs (Job A = completed-round stats merge,
# in weekly-update.yml). This one polls for team-list/lineup changes for the
# CURRENT round (the one being played right now, Thu-Sun), so predictions
# can use the most recent lineup info right up until just before kickoff.
#
# TRIGGER MECHANISM CHANGED 2026-06-23: this used to run on a fixed hourly
# GitHub Actions cron schedule. That was confirmed unreliable in practice --
# real observed gaps of 1-5 hours between supposedly-hourly runs
# (2026-06-22), caused by GitHub's shared-runner queueing delays, which are
# well documented to be worst at the top of the hour. For a job whose whole
# purpose is "catch changes within 1 hour of kickoff," that imprecision
# defeated the purpose.
#
# This workflow is now triggered EXCLUSIVELY via workflow_dispatch, called
# precisely by cron-job.org (see schedule-kickoffs.yml, which sets up one
# precisely-timed external trigger per match, 1 hour before each kickoff,
# every week). No more GitHub-native `schedule:` trigger here at all.
#
# The script's own kickoff-window check (scrape_team_lists.py) is STILL
# kept as a safety gate even though triggers are now precise -- if for any
# reason this gets triggered at the wrong time (e.g. someone manually runs
# it, or a future bug in the scheduling script), it will still correctly
# do nothing unless a match is genuinely within the window.
#
# SELF-CONTAINED, no dependency on Job A: an earlier version of this workflow
# relied on a sidecar file Job A was supposed to produce. That failed in a
# real test (2026-06-22) because Job A's schedule doesn't naturally produce
# that file for the round Job B needs. Job B now gets everything -- team
# list AND kickoff times -- from a single plain HTTP fetch of nrl.com's
# team-list article, which embeds both. See scrape_team_lists.py docstring.
# REAL BASELINE SCRAPE ADDED 2026-06-25, per Sam's explicit real
# correction to the architecture: NRL.com publishes each round's
# initial team lists every Tuesday ~4:00pm AEST/AEDT (confirmed via
# multiple independent real sources: rugbyleaguezone.com, legz.com.au,
# bettingpro.com.au, and nrl.com's own real published team-list
# articles, all independently stating the same real 4pm Tuesday
# release time). The existing cron-job.org-triggered runs (above) only
# ever fire 1 hour before each REAL match's kickoff -- by design, for
# precise late-mail capture -- but that meant there was NO real
# mechanism anywhere in this codebase to capture the INITIAL Tuesday
# team list at all. Confirmed via a real, traced investigation
# (2026-06-25): data/team_lists_current.csv was genuinely absent for
# Round 17 days after Sam had already provided real team-sheet
# information, because the file the pipeline actually reads from had
# no real path to ever be populated that early in the week.
#
# Real fix: a genuine, separate `schedule:` trigger at Tuesday ~6:10am
# UTC (~4:10pm AEST, a 10-minute buffer after the real ~4pm release
# time) calls the SAME real scrape_team_lists.py script, but with a
# much wider --hours-before window (96h) so its own real kickoff-gate
# logic treats the WHOLE upcoming round as "in window" rather than
# requiring imminent kickoff -- no changes to that script's internal
# logic were needed, since --hours-before was already a real, exposed
# CLI parameter. The existing precise cron-job.org-triggered runs are
# completely untouched and still handle late-mail updates close to
# each real kickoff, on top of this new Tuesday baseline.
#
# REAL, KNOWN LIMITATION: a fixed UTC cron time drifts by 1 real hour
# whenever Australia's AEST/AEDT daylight-saving clock changes (around
# early April and early October) -- this cron is tuned for AEST
# (winter, no daylight saving, current as of 2026-06-25). Worth
# revisiting if this is still running come October.
#
# P7 DECISION 2026-07-03 -- reviewed, DELIBERATELY NOT migrated to
# cron-job.org (the audit asked to either migrate this Tuesday trigger
# the way the kickoff triggers were, OR confirm it's not worth it).
# Confirmed not worth it, for real reasons:
#   - Unlike the kickoff triggers, this job's timing is NOT critical.
#     Those fire 1h before kickoff to catch late lineups, so GitHub
#     cron's real 1-5h drift could push them PAST kickoff -- a genuine
#     correctness bug. This job just captures the round's initial team
#     list (~4pm Tue) for a round whose earliest match is Thu night --
#     a ~48h cushion. Even GitHub cron's worst observed drift (4h late)
#     still lands the list Tue evening, ~48h before it's needed, and
#     the --hours-before 96 window below is deliberately wide enough to
#     absorb exactly this.
#   - cron-job.org's free tier has a finite job budget (~190/season,
#     already largely spent on the per-kickoff triggers). Spending more
#     of it on a standing weekly job that gains no timing benefit is a
#     poor trade.
#   - It would add a second external dependency + credential path to a
#     job that currently needs neither -- more failure surface, for a
#     job whose failure has a 48h recovery cushion anyway.
#   - Migrating wouldn't even fix the DST drift noted above: any
#     fixed-time scheduler has the same daylight-saving problem, and a
#     1h drift on a 48h cushion is harmless regardless.
# If a future session wants everything on one scheduler for
# consistency, the migration is straightforward (mirror
# schedule_kickoff_triggers.py's idempotent pattern) -- but it should
# be a deliberate consistency choice, not treated as a bug fix, because
# there is no real timing defect here to fix.
on:
  workflow_dispatch: {}
  schedule:
    - cron: '10 6 * * 2'  # Tuesday ~4:10pm AEST -- real baseline team-list scrape

jobs:
  poll-team-lists:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Poll for team list updates
        id: poll
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Real Tuesday baseline run -- wide window, captures the
            # whole round's just-released initial team list regardless
            # of how far away the earliest real kickoff still is.
            python3 scripts/scrape_team_lists.py \
              --output data/team_lists_current.csv \
              --hours-before 96
          else
            # Real, existing precise-kickoff path -- unchanged, still
            # uses the script's own real default (1 hour).
            python3 scripts/scrape_team_lists.py \
              --output data/team_lists_current.csv
          fi

      - name: Upload debug output (listing page if discovery failed; team-list page always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-listing-page-response
          path: debug_output/
          if-no-files-found: ignore
          retention-days: 7

      - name: Capture closing odds (CLV, Stage 4)
        # Only fires on cron-job.org workflow_dispatch triggers (i.e. near-
        # kickoff) -- NOT on the Tuesday schedule: baseline scrape).
        # The Tuesday run fires with schedule event_name; cron-job.org fires
        # with workflow_dispatch. So this step is gated on workflow_dispatch.
        #
        # Why here and not in generate-predictions.yml: predictions run once
        # per round (Thursday). Closing odds must be captured once per MATCH,
        # ~1h before kickoff. The cron-job.org triggers that fire team-list
        # polling already fire once per match -- so this step is free to add
        # here without any new infrastructure.
        #
        # Credit cost: 2 markets (h2h + tryscorer) x 1 region (au) = 2
        # credits per call. 8 calls per round = 16 credits. Combined with
        # the predictions run (24 credits): 40 credits/round, ~160/month --
        # well within the 500/month budget (2026-07-04 confirmed).
        #
        # Best-effort: a failed closing odds fetch does NOT block the
        # team-list commit. CLV entries just stay None for that fixture,
        # which is a worse ledger but not a pipeline failure.
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          # Extract home and away team from the dispatch inputs.
          # schedule-kickoffs.yml (cron-job.org trigger creator) passes
          # the fixture as "Home Team v Away Team" in the workflow inputs
          # when it creates the trigger -- read it from the environment
          # variable set by the dispatching job, which uses the fixture
          # label from season_draw_2026.json. Falls back to no-op if
          # inputs aren't present (e.g. a manual dispatch without them).
          FIXTURE="${{ github.event.inputs.fixture }}"
          ROUND="${{ github.event.inputs.round }}"
          SEASON="${{ github.event.inputs.season }}"
          if [ -z "$FIXTURE" ] || [ -z "$ROUND" ] || [ -z "$SEASON" ]; then
            echo "No fixture/round/season inputs on this dispatch -- closing odds capture skipped."
            echo "(Expected from cron-job.org trigger; manual dispatches without these inputs skip this step.)"
            exit 0
          fi
          # Parse "Home Team v Away Team" -> separate args
          HOME_TEAM="${FIXTURE% v *}"
          AWAY_TEAM="${FIXTURE#* v }"
          echo "Capturing closing odds for: $HOME_TEAM v $AWAY_TEAM (Round $ROUND, $SEASON)"
          python3 scripts/capture_closing_odds.py \
            --season "$SEASON" \
            --round "$ROUND" \
            --home-team "$HOME_TEAM" \
            --away-team "$AWAY_TEAM" \
            --data-dir data || echo "Closing odds capture failed (best-effort, non-fatal)"

      - name: Commit if updated
        run: |
          git config user.name "nrl-bot-automation"
          git config user.email "actions@github.com"
          if [ -f data/team_lists_current.csv ]; then
            git add data/team_lists_current.csv
            git diff --staged --quiet && echo "No changes to commit" || (
              git commit -m "Update team lists ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
              git push
            )
          else
            echo "data/team_lists_current.csv was not created this run -- nothing to commit."
          fi

# STATUS as of 2026-06-22:
# - Confirmed working (unit-tested against real fetched nrl.com content):
#   team-list parsing (54/54 players, 7/7 matches), kickoff-time extraction
#   and UTC->AEST conversion, kickoff-window gating logic.
# - Confirmed working (real Actions run): graceful no-op when nothing is
#   due, no crash on missing output file.
# - NOT YET CONFIRMED: the live `requests`-based fetch against nrl.com from
#   GitHub's IP has never actually executed -- every previous real test run
#   exited before reaching that code path (first due to a missing module,
#   then due to the now-removed sidecar-file dependency). The very next
#   manual trigger of this workflow will be the first real test of the
#   actual live fetch. Treat that run's result as new information, not
#   confirmation of something already proven.
